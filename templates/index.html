<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Scoring Model</title>
    <script src="{{ url_for('static', filename='plotly.min.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Credit Scoring Predictor</h1>
    <p class="subtitle">Enter applicant details to predict creditworthiness</p>

    <form action="/predict" method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Age</label>
                <input type="number" name="age" placeholder="e.g. 35" min="18" max="80" required>
            </div>
            <div class="form-group">
                <label>Annual Income ($)</label>
                <input type="number" name="income" placeholder="e.g. 75000" required>
            </div>
            <div class="form-group">
                <label>Loan Amount ($)</label>
                <input type="number" name="loan_amount" placeholder="e.g. 20000" required>
            </div>
            <div class="form-group">
                <label>Loan Tenure (Years)</label>
                <input type="number" name="loan_tenure" placeholder="e.g. 5" min="1" max="30" required>
            </div>
            <div class="form-group">
                <label>Number of Credit Cards</label>
                <input type="number" name="num_credit_cards" placeholder="e.g. 2" min="0" max="20" required>
            </div>
            <div class="form-group">
                <label>Existing Debts ($)</label>
                <input type="number" name="existing_debts" placeholder="e.g. 5000" required>
            </div>
            <div class="form-group">
                <label>Missed Payments (last 2 yrs)</label>
                <input type="number" name="missed_payments" placeholder="e.g. 1" min="0" max="20" required>
            </div>
            <div class="form-group">
                <label>Employment Type</label>
                <select name="employment_type" required>
                    <option value="">-- Select --</option>
                    <option value="2">Salaried</option>
                    <option value="1">Self-Employed</option>
                    <option value="0">Unemployed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Education Level</label>
                <select name="education" required>
                    <option value="">-- Select --</option>
                    <option value="0">High School</option>
                    <option value="1">Graduate</option>
                    <option value="2">Post-Graduate</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn">Predict Creditworthiness</button>
    </form>

    {% if prediction %}
    <div class="result" style="border-color: {{ color }};">
        <h2 style="color: {{ color }};">{{ prediction }}</h2>
        {% if confidence %}
        <p>Model Confidence: <strong>{{ confidence }}%</strong></p>
        {% endif %}
    </div>

    {% if gauge_json %}
    <div class="charts-grid">
        <div class="chart-box">
            <div id="gauge-chart" style="min-height:280px;"></div>
        </div>
        <div class="chart-box">
            <div id="pie-chart" style="min-height:350px;"></div>
        </div>
        <div class="chart-box wide">
            <div id="bar-chart" style="min-height:400px;"></div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var gaugeData = {{ gauge_json | safe }};
            var barData   = {{ bar_json   | safe }};
            var pieData   = {{ pie_json   | safe }};
            Plotly.newPlot('gauge-chart', gaugeData.data, gaugeData.layout, {responsive: true});
            Plotly.newPlot('bar-chart',   barData.data,   barData.layout,   {responsive: true});
            Plotly.newPlot('pie-chart',   pieData.data,   pieData.layout,   {responsive: true});
        });
    </script>
    {% endif %}

    {% endif %}
</div>

</body>
</html>
